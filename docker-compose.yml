#
# Flow Metrics JiraMetrics - Docker Compose Configuration
#
# This file defines a Docker Compose service for running JiraMetrics in a
# containerized environment. JiraMetrics downloads project data and generates
# self-contained HTML flow metrics reports.
#
# Features:
# - Automated report generation via Supercronic
# - Configurable schedule, port, timezone, and default landing page
# - Persistent storage for JiraMetrics config and generated reports
# - Optional pre-release or stable JiraMetrics installation at container startup
#
# Runtime behavior:
# - JiraMetrics stores generated artifacts under /config/target
# - Only *.html reports are published for web serving
# - The HTTP server serves the curated public directory, not the raw target directory
# - INDEX_FILE can be used to publish one selected report as /index.html
#
# Environment Variables:
#   INSTALL_PRE:          Install pre-release version of JiraMetrics at startup
#                         (default: true)
#   SUPERCRONIC_VERSION:  Version of Supercronic to use
#                         (default: v0.2.44)
#   CRON_SCHEDULE:        Cron schedule for report updates
#                         (default: every 30 minutes)
#   PORT:                 HTTP server port
#                         (default: 8000)
#   TZ:                   Timezone for cron jobs
#                         (default: Europe/Vienna)
#   INDEX_FILE:           HTML report file to expose as /index.html
#                         Example: "/Team Alpha.html"
#
# Usage:
# 1. Build the image:      docker compose build
# 2. Start the container:  docker compose up -d
# 3. Stop the container:   docker compose down
# 4. View logs:            docker compose logs -f
#
# Host storage:
# - ./myreports is mounted to /config in the container
# - JiraMetrics config is read from /config
# - Generated raw outputs are written to /config/target
# - Published HTML files are served from /config/www
#
services:
  jirametrics:
    image: flow-metrics-jirametrics
    container_name: flow-metrics-jirametrics
    build:
      context: .
      args:
        INSTALL_PRE: ${INSTALL_PRE:-false}
        SUPERCRONIC_VERSION: ${SUPERCRONIC_VERSION:-v0.2.44}
    environment:
      CRON_SCHEDULE: ${CRON_SCHEDULE:-*/30 * * * *}
      INSTALL_PRE: ${INSTALL_PRE:-false}
      PORT: ${PORT:-8000}
      TZ: Europe/Vienna
      INDEX_FILE: "/Team Liquorice.html"
    volumes:
      - ./myreports:/config
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    restart: unless-stopped
